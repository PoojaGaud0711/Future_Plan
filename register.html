<!DOCTYPE html>
<html>
<head>
    <title>Vrinda Register</title>
</head>
<body>
    <h2>Vrinda Signup</h2>
    <form id="myForm">
        Name: <input type="text" id="name" required><br><br>
        Email: <input type="email" id="email" required><br><br>
        Password: <input type="password" id="password" required><br><br>
        <button type="submit">Register</button>
    </form>
    <p id="msg"></p>

    <script>
        document.getElementById("myForm").onsubmit = async function(e) {
            e.preventDefault(); // Stop page refresh
            
            // Instantly prove the button works
            document.getElementById("msg").innerText = "Button clicked! Sending to server...";
            document.getElementById("msg").style.color = "blue";

            // Send data
            try {
                let res = await fetch("https://vrinda-backend-fq9q.onrender.com/api/v1/user/register?_=" + Date.now(), {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({
                        name: document.getElementById("name").value,
                        email: document.getElementById("email").value,
                        password: document.getElementById("password").value
                    })
                });
                
                let data = await res.json();
                
                if(data.success) {
                    document.getElementById("msg").style.color = "green";
                    document.getElementById("msg").innerText = "SUCCESS! User created!";
                } else {
                    document.getElementById("msg").style.color = "red";
                    document.getElementById("msg").innerText = data.message;
                }
            } catch(error) {
                document.getElementById("msg").style.color = "red";
                document.getElementById("msg").innerText = "Failed to connect to server.";
            }
        };
    </script>
</body>
</html>
